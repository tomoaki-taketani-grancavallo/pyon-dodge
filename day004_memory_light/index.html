<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>メモライト｜Day 4</title>
<meta name="description" content="光った順番を覚えて同じ順にタッチ！難易度を選んで全10ゲームで高スコアを目指す記憶力トレーニング。 / MemoLight / 记忆之光">
<meta name="theme-color" content="#0e1524">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#060a12; }
  body {
    font-family: system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI",sans-serif;
    display:flex; align-items:center; justify-content:center;
    color:#fff; user-select:none; -webkit-user-select:none;
  }
  #frame {
    position:relative;
    width: min(100vw, calc(100vh * 450 / 800), 450px);
    aspect-ratio: 450 / 800;
    overflow:hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.55);
    background:#0e1524;
  }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  /* HUD */
  #hud {
    position:absolute; top:0; left:0; right:0; padding:14px 16px 0;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none;
  }
  #score { font-size:44px; font-weight:800; line-height:1;
    text-shadow:0 3px 10px rgba(0,0,0,.5); letter-spacing:1px; }
  #scoreLbl { font-size:11px; font-weight:700; color:#9fb4e0; letter-spacing:2px; margin-top:2px; }
  #muteBtn {
    pointer-events:auto; width:40px; height:40px; border:none; border-radius:12px;
    background:rgba(255,255,255,.12); color:#fff; font-size:19px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  /* Overlays */
  .overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:28px;
    background:linear-gradient(180deg, rgba(8,12,24,.74), rgba(8,12,24,.93));
    backdrop-filter: blur(2px);
  }
  .hidden { display:none !important; }
  h1 { font-size:44px; font-weight:800; letter-spacing:1px; margin-bottom:6px;
    background:linear-gradient(90deg,#5b8bff,#40c4ff,#b06aff,#ff6ad5);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .tag { font-size:12px; color:#8aa0cc; letter-spacing:3px; margin-bottom:18px; }
  .lead { font-size:14px; color:#d3ddf2; line-height:1.7; margin-bottom:22px; max-width:310px; }
  .pick { font-size:12px; color:#9fb4e0; letter-spacing:2px; margin-bottom:12px; }
  .diffBtns { display:flex; flex-direction:column; gap:11px; width:100%; max-width:300px; }
  .diff {
    border:none; cursor:pointer; border-radius:16px; padding:13px 18px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    color:#0c1327; text-align:left;
  }
  .diff .dl { font-weight:800; font-size:18px; }
  .diff .dd { font-weight:600; font-size:11px; opacity:.8; margin-top:2px; }
  .diff .db { font-weight:800; font-size:12px; color:rgba(12,19,39,.7); white-space:nowrap; }
  .diff.easy   { background:linear-gradient(90deg,#6ada6a,#2fd0b0); }
  .diff.normal { background:linear-gradient(90deg,#40c4ff,#5b8bff); }
  .diff.hard   { background:linear-gradient(90deg,#b06aff,#ff6ad5); }
  .diff:active { transform:translateY(1px); }
  .btn {
    border:none; cursor:pointer; font-weight:800; font-size:17px; color:#0c1327;
    padding:15px 34px; border-radius:30px; margin:6px;
    background:linear-gradient(90deg,#40c4ff,#b06aff);
    box-shadow:0 8px 22px rgba(91,139,255,.4);
  }
  .btn.sub { background:rgba(255,255,255,.14); color:#fff; box-shadow:none;
    font-size:15px; padding:13px 26px; }
  .btn:active { transform:translateY(1px); }
  .row { display:flex; flex-wrap:wrap; justify-content:center; }
  .hint { font-size:12px; color:#7488ab; margin-top:20px; line-height:1.6; }

  #finalLabel { font-size:13px; color:#8aa0cc; letter-spacing:2px; margin-bottom:4px; }
  #finalScore { font-size:74px; font-weight:800; line-height:1; margin-bottom:2px;
    background:linear-gradient(90deg,#40c4ff,#b06aff);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  #finalMeta { font-size:14px; color:#cfe0ff; height:20px; margin-bottom:4px; }
  #record { font-size:15px; font-weight:800; color:#ffd54a; height:20px; margin-bottom:14px; }
  #chartWrap { margin-bottom:16px; }
  #chartTitle { font-size:11px; color:#8aa0cc; letter-spacing:2px; margin-bottom:6px; }
  canvas#chart { width:300px; height:92px; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="c"></canvas>

  <div id="hud">
    <div>
      <div id="score">0</div>
      <div id="scoreLbl"></div>
    </div>
    <button id="muteBtn" aria-label="mute">🔊</button>
  </div>

  <!-- Start -->
  <div id="startScreen" class="overlay">
    <h1 id="ttl">メモライト</h1>
    <div class="tag">DAY 4 / 100</div>
    <p class="lead" id="lead"></p>
    <div class="pick" id="pickLbl"></div>
    <div class="diffBtns">
      <button class="diff easy" id="btnEasy">
        <span><span class="dl" id="easyL"></span><span class="dd" id="easyD"></span></span>
        <span class="db" id="easyB"></span>
      </button>
      <button class="diff normal" id="btnNormal">
        <span><span class="dl" id="normalL"></span><span class="dd" id="normalD"></span></span>
        <span class="db" id="normalB"></span>
      </button>
      <button class="diff hard" id="btnHard">
        <span><span class="dl" id="hardL"></span><span class="dd" id="hardD"></span></span>
        <span class="db" id="hardB"></span>
      </button>
    </div>
    <div class="hint" id="ctrlHint"></div>
  </div>

  <!-- Result（全10ゲーム終了） -->
  <div id="overScreen" class="overlay hidden">
    <div id="finalLabel"></div>
    <div id="finalScore">0</div>
    <div id="finalMeta"></div>
    <div id="record"></div>
    <div id="chartWrap">
      <div id="chartTitle"></div>
      <canvas id="chart" width="600" height="184"></canvas>
    </div>
    <div class="row">
      <button class="btn" id="retryBtn"></button>
    </div>
    <div class="row">
      <button class="btn sub" id="shareBtn"></button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ===== Day4 記憶力トレーニング（正式名称：メモライト / MemoLight / 记忆之光） =====
   1ファイル完結・ビルド不要。Day1〜3の資産（PWA・多言語・Web Audio・シェアカード・
   デルタタイム基準ループ）を踏襲。3×3の9パネル、ペンタトニック音階。
   仕様: 開始前に難易度3択 → 全10ゲーム。各ゲームは毎回フルランダムな手順。
   ミスしてもそのゲームが失敗になるだけで、必ず10ゲーム遊べる（合計スコアを競う）。 */

/* ---------- 多言語 ---------- */
const LANG = (() => {
  const l = (navigator.language || "ja").toLowerCase();
  if (l.startsWith("ja")) return "ja";
  if (l.startsWith("zh")) return "zh";
  return "en";
})();
const T = {
  ja: { title:"メモライト",
        lead:"光る順番を覚えて同じ順にタッチ！ 手順は毎回ランダム。 難易度を選んで全10ゲームで高得点を目指そう。",
        pick:"難易度をえらぶ", ctrl:"光った順にパネルをタッチ",
        easy:"かんたん", normal:"ふつう", hard:"むずかしい",
        easyD:"3〜7手・ゆっくり", normalD:"4〜8手・ふつう", hardD:"5〜9手・はやい",
        best:"ベスト", scoreLbl:"SCORE",
        watch:"覚えて…", yourTurn:"あなたの番！",
        roundClear:"せいかい！", roundMiss:"ミス…",
        finalLabel:"スコア", newRec:"🎉 自己ベスト更新！",
        retry:"もう一度", share:"結果をシェア",
        chartTitle:"この2週間のベスト", perfect:"パーフェクト！",
        clearsOf:"クリア" },
  en: { title:"MemoLight",
        lead:"Memorize the lights and tap them back! A fresh random sequence every game. Pick a difficulty and aim high over 10 games.",
        pick:"CHOOSE DIFFICULTY", ctrl:"Tap the panels in the order they light up",
        easy:"EASY", normal:"NORMAL", hard:"HARD",
        easyD:"3–7 steps · slow", normalD:"4–8 steps · normal", hardD:"5–9 steps · fast",
        best:"Best", scoreLbl:"SCORE",
        watch:"Watch…", yourTurn:"Your turn!",
        roundClear:"CLEAR!", roundMiss:"Miss…",
        finalLabel:"SCORE", newRec:"🎉 New personal best!",
        retry:"Retry", share:"Share result",
        chartTitle:"Best of the last 2 weeks", perfect:"PERFECT!",
        clearsOf:"cleared" },
  zh: { title:"记忆之光",
        lead:"记住发光顺序再按相同顺序点击！ 每局顺序随机。 选择难度，用全10局挑战高分。",
        pick:"选择难度", ctrl:"按发光顺序点击面板",
        easy:"简单", normal:"普通", hard:"困难",
        easyD:"3〜7步·慢", normalD:"4〜8步·中", hardD:"5〜9步·快",
        best:"最高", scoreLbl:"分数",
        watch:"记住…", yourTurn:"轮到你了！",
        roundClear:"正确！", roundMiss:"失误…",
        finalLabel:"分数", newRec:"🎉 刷新个人纪录！",
        retry:"再来一次", share:"分享结果",
        chartTitle:"最近两周的最好成绩", perfect:"完美！",
        clearsOf:"通关" },
}[LANG];

document.documentElement.lang = LANG;
const $ = (id) => document.getElementById(id);
$("ttl").textContent = T.title;
$("lead").textContent = T.lead;
$("pickLbl").textContent = T.pick;
$("ctrlHint").textContent = T.ctrl;
$("scoreLbl").textContent = T.scoreLbl;
$("easyL").textContent = T.easy;   $("easyD").textContent = T.easyD;
$("normalL").textContent = T.normal; $("normalD").textContent = T.normalD;
$("hardL").textContent = T.hard;   $("hardD").textContent = T.hardD;
$("finalLabel").textContent = T.finalLabel;
$("retryBtn").textContent = T.retry;
$("shareBtn").textContent = T.share;
$("chartTitle").textContent = T.chartTitle;

/* ---------- キャンバス ---------- */
const W = 450, H = 800;
const canvas = $("c");
const ctx = canvas.getContext("2d");
let dpr = 1;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 3);
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener("resize", resize);

/* ---------- パネル定義（3×3・各色＋各音） ---------- */
const COLORS = [
  "#ff5a5a", "#ff9f43", "#ffd54a",
  "#6ada6a", "#2fd0b0", "#40c4ff",
  "#5b8bff", "#b06aff", "#ff6ad5",
];
// Cメジャー・ペンタトニックを9音（上段=低音→下段=高音）
const NOTES = [
  261.63, 293.66, 329.63,
  392.00, 440.00, 523.25,
  587.33, 659.25, 783.99,
];
const GRID_X = 45, GRID_Y = 232, CELL = 120, PAD = 9;
const PANELS = [];
for (let i=0;i<9;i++){
  const r = Math.floor(i/3), c = i%3;
  PANELS.push({
    x: GRID_X + c*CELL + PAD, y: GRID_Y + r*CELL + PAD, s: CELL - PAD*2,
    color: COLORS[i], note: NOTES[i], glow: 0, decay: 4,
  });
}
const GRID_BOTTOM = GRID_Y + 3*CELL;   // 592

/* ---------- 難易度・ゲーム定数 ---------- */
const ROUNDS = 10;            // 1プレイ=10ゲーム
const LEAD_IN = 0.55;         // お手本開始までの間
const ROUNDEND_HOLD = 1.15;   // ゲーム間の結果表示
const DIFF = {
  easy:   { key:"easy",   base:3, lit:0.55, gap:0.20, tap:3.2, mult:1, colU:"#6ada6a", colD:"#2fd0b0", label:T.easy },
  normal: { key:"normal", base:4, lit:0.40, gap:0.13, tap:2.6, mult:2, colU:"#40c4ff", colD:"#5b8bff", label:T.normal },
  hard:   { key:"hard",   base:5, lit:0.28, gap:0.09, tap:2.0, mult:3, colU:"#b06aff", colD:"#ff6ad5", label:T.hard },
};
// ラウンド(0始まり)ごとの手数：base + floor(round/2) → 例) easy:3,3,4,4,5,5,6,6,7,7
function seqLenForRound(r){ return diff.base + Math.floor(r/2); }

/* ---------- 状態 ---------- */
let state;                 // "title" | "show" | "input" | "roundend" | "over"
let diff = DIFF.normal;
let seq, roundIdx, score, roundScore, roundResults;
let showIdx, showLit, showTimer;
let inputIdx, inputTimer, inputTimerMax;
let banner, bannerText, bannerGood, roundEndTimer, shakeT, redFlash;
let bgTier, bgTierT;

function bestKey(k){ return "memolight_best_" + k; }
function bestOf(k){ try { return parseInt(localStorage.getItem(bestKey(k))||"0",10)||0; } catch(e){ return 0; } }

function lerp(a,b,t){ return a + (b-a)*t; }
function randPanel(){ return Math.floor(Math.random()*9); }

function resetPlay(d) {
  diff = d;
  for (const p of PANELS) p.glow = 0;
  score = 0; roundIdx = 0; roundResults = [];
  banner = 0; shakeT = 0; redFlash = 0; bgTier = 0; bgTierT = 0;
  updateHUD();
}

function updateHUD() {
  $("score").textContent = score || 0;
}

/* ---------- ラウンド進行 ---------- */
function lightPanel(idx, forShow) {
  const p = PANELS[idx];
  p.glow = 1;
  p.decay = forShow ? (1 / Math.max(0.12, diff.lit*0.9)) : 4.2;
  beepNote(p.note);
}

function startRound() {
  // 毎回フルランダムな手順を生成（前ラウンドは一切使わない）
  const L = seqLenForRound(roundIdx);
  seq = [];
  for (let i=0;i<L;i++) seq.push(randPanel());
  roundScore = 0;
  enterShow(LEAD_IN);
}

function enterShow(lead) {
  state = "show";
  showIdx = -1; showLit = false; showTimer = lead;
}

function enterInput() {
  state = "input";
  inputIdx = 0;
  inputTimerMax = diff.tap;
  inputTimer = inputTimerMax;
}

// ラウンド成功（全問正解）
function roundClear() {
  roundScore += seq.length * 10 * diff.mult;   // 全問正解ボーナス（タップ分と同額）
  score += roundScore;
  roundResults.push(true);
  beep("clear");
  const tier = Math.floor((roundIdx+1) / 4);
  if (tier > bgTier) { bgTier = tier; bgTierT = 1; }
  showBanner(T.roundClear + "  +" + roundScore, true);
  endRound();
}

// ラウンド失敗（誤タップ or 時間切れ）— プレイは終わらせない
function roundFail() {
  score += roundScore;                         // そこまでに取った分は加算
  roundResults.push(false);
  shakeT = 0.4; redFlash = 1;
  beep("wrong");
  showBanner(T.roundMiss, false);
  endRound();
}

function endRound() {
  updateHUD();
  state = "roundend";
  roundEndTimer = ROUNDEND_HOLD;
}

function finishPlay() {
  state = "over";
  const clears = roundResults.filter(Boolean).length;
  recordDaily(score);
  const prevBest = bestOf(diff.key);
  const isRec = score > 0 && score >= prevBest;
  if (score > prevBest) { try { localStorage.setItem(bestKey(diff.key), score); } catch(e){} }
  $("finalScore").textContent = score;
  $("finalMeta").textContent = diff.label + " ・ " + clears + "/" + ROUNDS + " " + T.clearsOf
    + (clears === ROUNDS ? "  " + T.perfect : "");
  $("record").textContent = isRec ? T.newRec : (T.best + " " + Math.max(prevBest, score));
  drawChart();
  setTimeout(() => $("overScreen").classList.remove("hidden"), 700);
}

function showBanner(txt, good) { banner = 1.3; bannerText = txt; bannerGood = good; }

/* ---------- 入力 ---------- */
function panelAt(px, py) {
  for (let i=0;i<9;i++){
    const p = PANELS[i];
    if (px >= p.x && px <= p.x+p.s && py >= p.y && py <= p.y+p.s) return i;
  }
  return -1;
}
function tapPanel(idx) {
  if (state !== "input") return;
  lightPanel(idx, false);
  if (idx === seq[inputIdx]) {
    roundScore += 10 * diff.mult;
    inputIdx++;
    updateHUD2();
    if (inputIdx >= seq.length) { roundClear(); }
    else { inputTimerMax = diff.tap; inputTimer = inputTimerMax; }
  } else {
    roundFail();
  }
}
// 入力中の見かけスコア（確定はラウンド終了時だが、体感のため加算表示）
function updateHUD2(){ $("score").textContent = score + roundScore; }

/* ---------- ループ ---------- */
let last = 0;
function frame(ts) {
  if (!last) last = ts;
  let dt = (ts - last) / 1000; last = ts;
  if (dt > 0.05) dt = 0.05;
  update(dt);
  render();
  requestAnimationFrame(frame);
}

function update(dt) {
  for (const p of PANELS) if (p.glow > 0) p.glow = Math.max(0, p.glow - p.decay*dt);

  if (state === "show") {
    showTimer -= dt;
    if (showTimer <= 0) {
      if (!showLit) {
        showIdx++;
        if (showIdx >= seq.length) { enterInput(); }
        else { lightPanel(seq[showIdx], true); showLit = true; showTimer = diff.lit; }
      } else {
        showLit = false; showTimer = diff.gap;
      }
    }
  } else if (state === "input") {
    inputTimer -= dt;
    if (inputTimer <= 0) { inputTimer = 0; roundFail(); }
  } else if (state === "roundend") {
    roundEndTimer -= dt;
    if (roundEndTimer <= 0) {
      roundIdx++;
      if (roundIdx >= ROUNDS) finishPlay();
      else startRound();
    }
  } else if (state === "title") {
    if (Math.random() < dt*1.4) { const p = PANELS[randPanel()]; p.glow = 0.8; p.decay = 3; }
  }

  if (shakeT > 0) shakeT = Math.max(0, shakeT - dt);
  if (redFlash > 0) redFlash = Math.max(0, redFlash - dt*2);
  if (banner > 0) banner = Math.max(0, banner - dt);
  if (bgTierT > 0) bgTierT = Math.max(0, bgTierT - dt*0.6);
}

/* ---------- 描画 ---------- */
function hexToRgb(h){ const n = parseInt(h.slice(1),16); return [ (n>>16)&255, (n>>8)&255, n&255 ]; }
function shade(h, f){ const [r,g,b] = hexToRgb(h); return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`; }

function bgColors() {
  const palettes = [
    ["#131d33","#0b1120"], ["#1a1530","#0e0a1c"], ["#0f2333","#08131e"],
    ["#231327","#150a18"],
  ];
  return palettes[bgTier % palettes.length];
}

function render() {
  const [c0,c1] = bgColors();
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, c0); bg.addColorStop(1, c1);
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  ctx.fillStyle = "rgba(255,255,255,.05)";
  for (let i=0;i<44;i++){ const sx=(i*97%W), sy=((i*53)%H); ctx.fillRect(sx, sy, 2, 2); }

  // ラウンド進捗（10ゲームのピップ）
  if (state !== "title") drawProgress();

  ctx.save();
  if (shakeT > 0) { const s = shakeT*22; ctx.translate((Math.random()-.5)*s,(Math.random()-.5)*s); }
  for (const p of PANELS) drawPanel(p);
  ctx.restore();

  drawStatus();
  if (state === "input") drawInputBar();

  if (redFlash > 0) { ctx.fillStyle = `rgba(255,50,50,${redFlash*0.32})`; ctx.fillRect(0,0,W,H); }

  if (banner > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, banner*1.5);
    ctx.textAlign = "center";
    ctx.fillStyle = bannerGood ? "#7fe0a0" : "#ff7a7a";
    ctx.font = "800 34px system-ui,sans-serif";
    ctx.fillText(bannerText, W/2, H/2 - 40);
    ctx.restore();
  }
}

function drawProgress() {
  const n = ROUNDS, gap = 8, r = 5;
  const totalW = n*(r*2) + (n-1)*gap;
  let x = (W - totalW)/2 + r, y = 150;
  ctx.font = "800 14px system-ui,sans-serif"; ctx.textAlign = "center"; ctx.fillStyle = "#9fb4e0";
  const cur = Math.min(roundIdx+1, ROUNDS);
  ctx.fillText("GAME " + cur + " / " + ROUNDS, W/2, y - 14);
  for (let i=0;i<n;i++){
    let col;
    if (i < roundResults.length) col = roundResults[i] ? "#6ada6a" : "#ff6a6a";
    else if (i === roundIdx && state !== "over") col = "#ffd54a";
    else col = "rgba(255,255,255,.16)";
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x + i*(r*2+gap), y, r, 0, Math.PI*2); ctx.fill();
  }
}

function drawPanel(p) {
  const lit = p.glow;
  roundRectPath(p.x, p.y, p.s, p.s, 20);
  ctx.fillStyle = shade(p.color, 0.32);
  ctx.fill();
  roundRectPath(p.x+2, p.y+2, p.s-4, p.s-4, 18);
  ctx.strokeStyle = "rgba(255,255,255,.06)"; ctx.lineWidth = 2; ctx.stroke();

  if (lit > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, lit);
    ctx.shadowColor = p.color; ctx.shadowBlur = 34*lit;
    roundRectPath(p.x, p.y, p.s, p.s, 20);
    ctx.fillStyle = p.color; ctx.fill();
    ctx.shadowBlur = 0; ctx.globalAlpha = Math.min(1, lit)*0.45;
    roundRectPath(p.x+p.s*0.16, p.y+p.s*0.12, p.s*0.68, p.s*0.32, 14);
    ctx.fillStyle = "#ffffff"; ctx.fill();
    ctx.restore();
  }
}

function drawStatus() {
  let txt = "";
  if (state === "show") txt = T.watch;
  else if (state === "input") txt = T.yourTurn;
  if (!txt) return;
  ctx.textAlign = "center";
  ctx.font = "800 22px system-ui,sans-serif";
  ctx.fillStyle = state === "input" ? "#ffd54a" : "#8fb0ff";
  ctx.fillText(txt, W/2, GRID_BOTTOM + 46);
}

function drawInputBar() {
  const bw = 300, bx = (W-bw)/2, by = GRID_BOTTOM + 66, bh = 8;
  ctx.fillStyle = "rgba(255,255,255,.12)";
  roundRectPath(bx, by, bw, bh, 4); ctx.fill();
  const tp = Math.max(0, inputTimer / inputTimerMax);
  const low = tp < 0.34;
  ctx.fillStyle = low ? `rgba(255,90,80,${0.6+0.4*Math.sin(last*0.012)})` : "#40c4ff";
  roundRectPath(bx, by, Math.max(0, bw*tp), bh, 4); ctx.fill();
}

function roundRectPath(x,y,w,h,r){
  if (w <= 0 || h <= 0) { ctx.beginPath(); return; }
  r = Math.max(0, Math.min(r, w/2, h/2));
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

/* ---------- 入力イベント ---------- */
function toLocal(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width * W;
  const y = (e.clientY - rect.top) / rect.height * H;
  return { x, y };
}
$("frame").addEventListener("pointerdown", (e) => {
  if (state !== "input") return;
  e.preventDefault();
  const p = toLocal(e);
  const idx = panelAt(p.x, p.y);
  if (idx >= 0) tapPanel(idx);
});

/* ---------- Web Audio（Day1〜3流用） ---------- */
let actx = null, muted = false;
function ensureAudio(){ if(!actx){ try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } if(actx && actx.state==="suspended") actx.resume(); }
function tone(freq, dur, type, vol, when){
  if (!actx || muted) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type||"sine"; o.frequency.value = freq;
  const t = actx.currentTime + (when||0);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol||0.15, t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+dur);
}
function noise(dur, vol){
  if (!actx || muted) return;
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<n;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/n, 2);
  const src = actx.createBufferSource(); src.buffer = buf;
  const g = actx.createGain(); g.gain.value = vol||0.3;
  src.connect(g); g.connect(actx.destination); src.start();
}
function beepNote(freq){ tone(freq, 0.34, "sine", 0.2); tone(freq*2, 0.18, "triangle", 0.06); }
function beep(kind){
  if (kind==="clear"){ [0,4,7,12].forEach((s,i)=>tone(523.25*Math.pow(2,s/12),0.16,"triangle",0.13,i*0.06)); }
  else if (kind==="wrong"){ noise(0.3,0.28); tone(150,0.35,"sawtooth",0.16); tone(90,0.4,"sawtooth",0.14,0.05); }
}
$("muteBtn").addEventListener("click", (e) => {
  e.stopPropagation(); muted = !muted;
  $("muteBtn").textContent = muted ? "🔇" : "🔊";
});

/* ---------- 日別ベストの記録・可視化 ---------- */
function todayStr(){ const d = new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function loadDays(){ try { return JSON.parse(localStorage.getItem("memolight_days")||"{}") || {}; } catch(e){ return {}; } }
function recordDaily(v){
  if (v <= 0) return;
  const days = loadDays(); const k = todayStr();
  if ((days[k]||0) < v) { days[k] = v; try { localStorage.setItem("memolight_days", JSON.stringify(days)); } catch(e){} }
}
function lastNDates(n){
  const arr = []; const base = new Date();
  for (let i=n-1;i>=0;i--){ const t = new Date(base); t.setDate(base.getDate()-i);
    arr.push(t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0")); }
  return arr;
}
function drawChart() {
  const cv = $("chart");
  const g = cv.getContext("2d");
  const cw = cv.width, ch = cv.height;
  g.clearRect(0,0,cw,ch);
  const days = loadDays();
  const keys = lastNDates(14);
  const vals = keys.map(k => days[k]||0);
  const mx = Math.max(1, ...vals);
  const today = todayStr();
  const n = keys.length;
  const gap = 8, bw = (cw - gap*(n-1)) / n;
  const baseY = ch - 24, topY = 14;
  g.strokeStyle = "rgba(255,255,255,.08)"; g.lineWidth = 2;
  g.beginPath(); g.moveTo(0, baseY); g.lineTo(cw, baseY); g.stroke();
  for (let i=0;i<n;i++){
    const v = vals[i];
    const h = v > 0 ? Math.max(6, (baseY-topY) * v/mx) : 3;
    const x = i*(bw+gap), y = baseY - h;
    const isToday = keys[i] === today;
    if (isToday) {
      const grad = g.createLinearGradient(0,y,0,baseY);
      grad.addColorStop(0,"#40c4ff"); grad.addColorStop(1,"#b06aff");
      g.fillStyle = grad;
    } else {
      g.fillStyle = v > 0 ? "rgba(150,170,220,.55)" : "rgba(255,255,255,.12)";
    }
    roundRect2(g, x, y, bw, h, 5); g.fill();
    if (v > 0) {
      g.fillStyle = isToday ? "#ffffff" : "#9fb4e0";
      g.font = "700 18px system-ui,sans-serif"; g.textAlign = "center";
      g.fillText(v, x+bw/2, y-6);
    }
  }
}
function roundRect2(g,x,y,w,h,r){
  if (w<=0||h<=0){ g.beginPath(); return; }
  r = Math.max(0, Math.min(r, w/2, h/2));
  g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath();
}

/* ---------- シェアカード ---------- */
function share() {
  const cw = 600, ch = 800;
  const oc = document.createElement("canvas"); oc.width = cw; oc.height = ch;
  const o = oc.getContext("2d");
  const g = o.createLinearGradient(0,0,0,ch);
  g.addColorStop(0,"#131d33"); g.addColorStop(1,"#0b1120");
  o.fillStyle = g; o.fillRect(0,0,cw,ch);

  const gx = 150, gy = 150, cell = 100, pad = 10;
  for (let i=0;i<9;i++){
    const r = Math.floor(i/3), c = i%3;
    const x = gx + c*cell + pad, y = gy + r*cell + pad, s = cell - pad*2;
    o.fillStyle = COLORS[i];
    roundRect2(o, x, y, s, s, 16); o.fill();
  }
  const clears = roundResults.filter(Boolean).length;
  o.textAlign = "center";
  o.fillStyle = "#fff"; o.font = "800 110px system-ui,sans-serif";
  o.fillText(score, cw/2, 585);
  o.fillStyle = "#9fb4e0"; o.font = "700 28px system-ui,sans-serif";
  o.fillText(T.finalLabel + " ・ " + diff.label + " ・ " + clears + "/" + ROUNDS + " " + T.clearsOf, cw/2, 632);
  o.fillStyle = "#cfe0ff"; o.font = "600 26px system-ui,sans-serif";
  o.fillText(T.title + "  ・  Day 4 / 100", cw/2, 706);
  o.fillStyle = "#8aa0cc"; o.font = "600 22px system-ui,sans-serif";
  o.fillText("apps.grancavallo.com", cw/2, 744);

  oc.toBlob(async (blob) => {
    const file = new File([blob], "memolight.png", { type: "image/png" });
    const data = { files: [file], title: T.title, text: `${T.finalLabel}: ${score}` };
    if (navigator.canShare && navigator.canShare(data)) {
      try { await navigator.share(data); return; } catch(e){}
    }
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "memolight.png"; a.click();
  }, "image/png");
}
