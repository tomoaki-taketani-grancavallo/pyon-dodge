<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ワンタップ・ジャンプ | Day 1 - 100日アプリチャレンジ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
    background: linear-gradient(160deg, #1b2a4a 0%, #2e4370 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100%; padding: 12px; color: #fff;
  }
  #wrap { position: relative; width: min(100%, 900px); }
  canvas {
    display: block; width: 100%; aspect-ratio: 800 / 450;
    border-radius: 14px; touch-action: none; user-select: none;
    -webkit-user-select: none; box-shadow: 0 12px 40px rgba(0,0,0,.4);
  }
  footer { margin-top: 10px; font-size: 12px; opacity: .6; }
  #overlay {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  #overlay.hidden { display: none; }
  .panel {
    pointer-events: auto; text-align: center;
    background: rgba(255,255,255,.96); color: #24324a;
    border-radius: 18px; padding: 26px 34px; max-width: 86%;
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  .panel.hidden { display: none; }
  .panel h1 { font-size: 28px; margin-bottom: 8px; }
  .panel h2 { font-size: 24px; margin-bottom: 8px; }
  .panel p { font-size: 14px; line-height: 1.7; margin-bottom: 14px; }
  .panel button {
    display: block; width: 100%; margin: 8px 0; padding: 12px 18px;
    font-size: 16px; font-weight: 700; color: #fff; cursor: pointer;
    background: linear-gradient(135deg, #ff8a5c, #ff5e62);
    border: none; border-radius: 12px;
  }
  .panel button:active { transform: scale(.97); }
  .panel button.ghost {
    background: #eef1f6; color: #47597a;
  }
  .scorebig { font-size: 56px; font-weight: 800; line-height: 1.2; color: #ff5e62; }
  .best { font-size: 14px; color: #6b7a94; margin: 6px 0 10px; }
  .note { font-size: 11px; color: #98a4b8; margin-top: 10px; }
  #newBest {
    display: inline-block; background: #ffce3a; color: #7a5b00;
    font-weight: 800; font-size: 12px; border-radius: 8px; padding: 2px 8px;
  }
  #newBest.hidden { display: none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="overlay">
    <div id="panelTitle" class="panel">
      <h1>🏃 ワンタップ・ジャンプ</h1>
      <p>奥へ向かって自動で走り続ける3レーンランナー。<br>← → スワイプ（PCは矢印キー）でレーン移動、<br>タップ / スペースでジャンプ！<br>空中でもう一度タップすると<b>2段ジャンプ</b>。<br>木箱はよけて、バーは飛び越えろ。</p>
      <button id="btnStart">スタート</button>
      <div class="best">ベストスコア: <span id="bestTitle">0</span></div>
    </div>
    <div id="panelRevive" class="panel hidden">
      <h2>💥 クラッシュ！</h2>
      <p>スコア: <b id="scoreRevive">0</b></p>
      <button id="btnRevive">🎬 復活する（あと1回）</button>
      <button id="btnGiveup" class="ghost">あきらめる</button>
      <p class="note">※製品版では動画リワード広告の視聴で復活する想定（現在はモック）</p>
    </div>
    <div id="panelOver" class="panel hidden">
      <h2>ゲームオーバー</h2>
      <div class="scorebig" id="scoreOver">0</div>
      <div class="best">ベスト: <span id="bestOver">0</span> <span id="newBest" class="hidden">NEW!</span></div>
      <button id="btnRetry">もう一度あそぶ</button>
      <button id="btnShare" class="ghost">📤 シェアする</button>
      <button id="btnSave" class="ghost">💾 結果画像を保存</button>
    </div>
  </div>
</div>
<footer>Day 1 / 100 — 100日アプリチャレンジ（2026-07-05）</footer>

<script>
(() => {
  'use strict';
  const BEST_KEY = 'day001_tapjump_best';
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = 800, H = 450;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // --- 疑似3D投影 ---
  // 世界座標: wx = 左右(レーン中心 -100/0/+100)、z = プレイヤーからの前方距離
  const HORIZON = 150;            // 地平線のy
  const PROJ = 260;               // 地平線からプレイヤー足元(y=410)までの距離
  const DNEAR = 60;               // 透視の焦点距離
  const XSCALE = 2.27;            // 世界x→画面xの倍率(手前)
  const LANE_W = 100;             // レーン幅(世界座標)
  const SPAWN_Z = 420;            // 障害物の出現距離

  function proj(z, wx) {
    const s = DNEAR / (DNEAR + Math.max(z, -30));
    return { s, x: W / 2 + wx * XSCALE * s, y: HORIZON + PROJ * s };
  }

  const $ = id => document.getElementById(id);
  const panels = { title: $('panelTitle'), revive: $('panelRevive'), over: $('panelOver') };

  function showPanel(name) {
    const ov = $('overlay');
    if (!name) { ov.classList.add('hidden'); return; }
    ov.classList.remove('hidden');
    for (const k in panels) panels[k].classList.toggle('hidden', k !== name);
  }

  let state = 'title'; // title | play | dead | over
  let laneTarget, laneF, jumpH, vy, jumpHeld, jumpCount;
  let speed, dist, score, reviveLeft, invUntil, overAt;
  let obstacles, trees, clouds, puffs, zAcc, nextGap;
  let best = +(localStorage.getItem(BEST_KEY) || 0);

  function reset() {
    laneTarget = 1; laneF = 1; jumpH = 0; vy = 0; jumpHeld = false; jumpCount = 0;
    speed = 1.2; dist = 0; score = 0; reviveLeft = 1; invUntil = 0;
    obstacles = []; trees = []; clouds = []; puffs = []; zAcc = 0; nextGap = 220;
    for (let i = 0; i < 5; i++) {
      clouds.push({ x: Math.random() * W, y: 20 + Math.random() * 90, s: 0.5 + Math.random() * 0.8 });
    }
    for (let i = 0; i < 8; i++) spawnTree(Math.random() * SPAWN_Z);
  }

  function spawnTree(z) {
    trees.push({
      z,
      wx: (Math.random() < 0.5 ? -1 : 1) * (230 + Math.random() * 170),
      h: 34 + Math.random() * 40,
    });
  }

  // kind: 0=木箱(よける) / 1=ハードル(飛ぶ) / 2=全レーンバー(飛ぶ)
  function spawnPattern() {
    const r = Math.random();
    if (dist > 1500 && r < 0.18) {
      obstacles.push({ z: SPAWN_Z, lane: -1, kind: 2 });
    } else if (dist > 2500 && r < 0.42) {
      const open = Math.floor(Math.random() * 3);
      for (let l = 0; l < 3; l++) if (l !== open) obstacles.push({ z: SPAWN_Z, lane: l, kind: 0 });
    } else if (r < 0.7) {
      obstacles.push({ z: SPAWN_Z, lane: Math.floor(Math.random() * 3), kind: 0 });
    } else {
      obstacles.push({ z: SPAWN_Z, lane: Math.floor(Math.random() * 3), kind: 1 });
    }
  }

  function changeLane(dir) {
    if (state !== 'play') return;
    laneTarget = Math.max(0, Math.min(2, laneTarget + dir));
  }

  function jump() {
    if (state !== 'play') return;
    if (jumpH === 0) {
      // 1段目
      vy = 9.5;
      jumpH = 0.01;
      jumpCount = 1;
    } else if (jumpCount < 2) {
      // 2段目（空中でもう一度）
      vy = 9.0;
      jumpCount = 2;
      const p = proj(0, (laneF - 1) * LANE_W);
      puffs.push({ x: p.x, y: p.y - jumpH, r: 10, a: 0.8 });
    }
  }

  // dt は 60fps を 1.0 とするフレーム単位（120Hz端末でも速度が変わらないようにする）
  function update(dt) {
    if (state !== 'play') return;
    speed = Math.min(3.2, speed + 0.0004 * dt);
    const dz = speed * 3 * dt;
    dist += dz;
    score = Math.floor(dist / 20);

    zAcc += dz;
    if (zAcc >= nextGap) {
      zAcc = 0;
      nextGap = (150 + Math.random() * 110) * (0.8 + speed * 0.25);
      spawnPattern();
    }
    if (Math.random() < 0.02 * dt) spawnTree(SPAWN_Z);

    for (const o of obstacles) o.z -= dz;
    for (const t of trees) t.z -= dz;
    obstacles = obstacles.filter(o => o.z > -40);
    trees = trees.filter(t => t.z > -40);

    laneF += (laneTarget - laneF) * Math.min(1, 0.22 * dt);

    if (jumpH > 0 || vy > 0) {
      jumpH += vy * dt;
      const g = (jumpHeld && vy > 0) ? 0.38 : 0.52;
      vy -= g * dt;
      if (jumpH <= 0) { jumpH = 0; vy = 0; jumpCount = 0; }
    }

    if (performance.now() > invUntil) {
      for (const o of obstacles) {
        if (o.z < 10 && o.z > -8) {
          if (o.kind === 2) {
            if (jumpH < 45) { die(); return; }
          } else if (Math.abs(laneF - o.lane) < 0.55) {
            if (o.kind === 0 || jumpH < 45) { die(); return; }
          }
        }
      }
    }
  }

  function die() {
    state = 'dead';
    if (reviveLeft > 0) {
      $('scoreRevive').textContent = score;
      showPanel('revive');
    } else {
      finish();
    }
  }

  function finish() {
    state = 'over';
    overAt = performance.now();
    if (score > best) {
      best = score;
      localStorage.setItem(BEST_KEY, best);
      $('newBest').classList.remove('hidden');
    } else {
      $('newBest').classList.add('hidden');
    }
    $('scoreOver').textContent = score;
    $('bestOver').textContent = best;
    showPanel('over');
  }

  function revive() {
    reviveLeft--;
    obstacles = obstacles.filter(o => o.z > 250);
    jumpH = 0; vy = 0; jumpCount = 0;
    invUntil = performance.now() + 1800;
    showPanel(null);
    state = 'play';
  }

  function start() {
    reset();
    showPanel(null);
    state = 'play';
  }

  // ---- 描画 ----
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    if (ctx.roundRect) { ctx.roundRect(x, y, w, h, r); return; }
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawCloud(x, y, s) {
    ctx.beginPath();
    ctx.arc(x, y, 18 * s, 0, 7);
    ctx.arc(x + 18 * s, y + 6 * s, 14 * s, 0, 7);
    ctx.arc(x - 18 * s, y + 6 * s, 13 * s, 0, 7);
    ctx.fill();
  }

  function drawTree(t) {
    const p = proj(t.z, t.wx);
    const trunkW = 8 * XSCALE * p.s, trunkH = t.h * 0.5 * XSCALE * p.s;
    const crown = t.h * 0.75 * XSCALE * p.s;
    ctx.fillStyle = '#8d6748';
    ctx.fillRect(p.x - trunkW / 2, p.y - trunkH, trunkW, trunkH);
    ctx.fillStyle = '#3f9e4d';
    ctx.beginPath();
    ctx.arc(p.x, p.y - trunkH - crown * 0.5, crown * 0.62, 0, 7);
    ctx.fill();
  }

  function drawObstacle(o) {
    const wx = o.kind === 2 ? 0 : (o.lane - 1) * LANE_W;
    const p = proj(o.z, wx);
    if (o.kind === 0) {
      // 木箱（背が高い・よける）
      const w = 78 * XSCALE * p.s, h = 96 * XSCALE * p.s;
      const x = p.x - w / 2, y = p.y - h;
      // 手前に迫った箱は半透明にして、奥のレーン・次の障害物の視界を確保する
      ctx.globalAlpha = o.z < 140 ? 0.35 + 0.65 * Math.max(0, Math.min(1, (o.z - 30) / 110)) : 1;
      ctx.fillStyle = '#b0733c';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#7d4f26';
      ctx.lineWidth = Math.max(1, 3 * p.s);
      ctx.strokeRect(x, y, w, h);
      ctx.beginPath();
      ctx.moveTo(x, y); ctx.lineTo(x + w, y + h);
      ctx.moveTo(x + w, y); ctx.lineTo(x, y + h);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else {
      // ハードル／全レーンバー（低い・飛び越える）
      const w = (o.kind === 2 ? 304 : 84) * XSCALE * p.s;
      const barH = 16 * XSCALE * p.s, legH = 30 * XSCALE * p.s;
      const x = p.x - w / 2, y = p.y - legH - barH;
      ctx.fillStyle = '#5a6270';
      ctx.fillRect(x + 2, p.y - legH, Math.max(2, 5 * p.s), legH);
      ctx.fillRect(x + w - 2 - Math.max(2, 5 * p.s), p.y - legH, Math.max(2, 5 * p.s), legH);
      ctx.fillStyle = o.kind === 2 ? '#e5484d' : '#f4c542';
      ctx.fillRect(x, y, w, barH);
      ctx.fillStyle = 'rgba(255,255,255,.85)';
      const stripes = o.kind === 2 ? 6 : 2;
      for (let i = 0; i < stripes; i++) {
        ctx.fillRect(x + w * (i * 2 + 1) / (stripes * 2 + 1), y, w / (stripes * 2 + 1), barH);
      }
    }
  }

  function drawPlayer() {
    const p = proj(0, (laneF - 1) * LANE_W);
    // 影（ジャンプ中も地面に残る＝高さの手がかり）
    const sh = Math.max(0.4, 1 - jumpH / 260);
    ctx.fillStyle = 'rgba(0,0,0,.22)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y - 5, 34 * sh, 11 * sh, 0, 0, 7);
    ctx.fill();

    if (performance.now() < invUntil && Math.floor(performance.now() / 120) % 2) return;
    const px = p.x, py = p.y - jumpH;
    // 足
    ctx.fillStyle = '#e0534a';
    if (jumpH === 0 && state === 'play') {
      const ph = Math.floor(performance.now() / 85) % 2;
      ctx.fillRect(px - 22, py - 12 + (ph ? -4 : 0), 14, 12 + (ph ? 4 : 0));
      ctx.fillRect(px + 8, py - 12 + (ph ? 0 : -4), 14, 12 + (ph ? 0 : 4));
    } else {
      ctx.fillRect(px - 22, py - 16, 14, 12);
      ctx.fillRect(px + 8, py - 16, 14, 12);
    }
    // 体（後ろ姿）
    ctx.fillStyle = '#ff6b5e';
    roundRect(px - 30, py - 70, 60, 58, 14);
    ctx.fill();
    // リュック
    ctx.fillStyle = '#ffd166';
    roundRect(px - 16, py - 58, 32, 30, 8);
    ctx.fill();
    // 耳
    ctx.fillStyle = '#ff6b5e';
    ctx.beginPath(); ctx.arc(px - 18, py - 72, 7, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 18, py - 72, 7, 0, 7); ctx.fill();
  }

  function draw() {
    // 空
    const sky = ctx.createLinearGradient(0, 0, 0, HORIZON);
    sky.addColorStop(0, '#6db5ff');
    sky.addColorStop(1, '#c9e8ff');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, HORIZON);

    ctx.fillStyle = 'rgba(255,255,255,.85)';
    for (const c of clouds) {
      c.x -= 0.15 * c.s;
      if (c.x < -80) { c.x = W + 60; c.y = 20 + Math.random() * 90; }
      drawCloud(c.x, c.y, c.s);
    }

    // 草原（zの縞で速度感を出す）
    ctx.fillStyle = '#67b854';
    ctx.fillRect(0, HORIZON, W, H - HORIZON);
    ctx.fillStyle = '#5fae4d';
    const period = 120;
    for (let z = period - (dist % period) - period; z < 1400; z += period) {
      const y1 = proj(Math.max(z, 0), 0).y;
      const y2 = proj(Math.max(z + period * 0.5, 0), 0).y;
      if (y1 - y2 > 0.5) ctx.fillRect(0, y2, W, y1 - y2);
    }

    // 道路（台形）
    const roadHalfAt = y => (y - HORIZON) / PROJ * 150 * XSCALE;
    ctx.fillStyle = '#6b6f7a';
    ctx.beginPath();
    ctx.moveTo(W / 2, HORIZON);
    ctx.lineTo(W / 2 - roadHalfAt(H), H);
    ctx.lineTo(W / 2 + roadHalfAt(H), H);
    ctx.closePath();
    ctx.fill();

    // 路肩の白線
    ctx.strokeStyle = 'rgba(255,255,255,.7)';
    ctx.lineWidth = 3;
    for (const wx of [-146, 146]) {
      ctx.beginPath();
      ctx.moveTo(W / 2 + wx * XSCALE * 0.02, HORIZON + PROJ * 0.02);
      ctx.lineTo(W / 2 + wx * XSCALE * (H - HORIZON) / PROJ, H);
      ctx.stroke();
    }

    // レーン区切りの破線（流れて速度感を出す）
    ctx.fillStyle = 'rgba(255,255,255,.75)';
    const dashP = 60;
    for (const wx of [-50, 50]) {
      for (let z = dashP - (dist % dashP) - dashP; z < SPAWN_Z; z += dashP) {
        const z0 = Math.max(z, 0.5), z1 = Math.max(z + 24, 1);
        if (z1 <= z0) continue;
        const pNear = proj(z0, wx), pFar = proj(z1, wx);
        const wNear = Math.max(1.5, 5 * pNear.s), wFar = Math.max(1, 5 * pFar.s);
        ctx.beginPath();
        ctx.moveTo(pFar.x - wFar, pFar.y);
        ctx.lineTo(pFar.x + wFar, pFar.y);
        ctx.lineTo(pNear.x + wNear, pNear.y);
        ctx.lineTo(pNear.x - wNear, pNear.y);
        ctx.closePath();
        ctx.fill();
      }
    }

    // 遠→近の順に描画
    trees.sort((a, b) => b.z - a.z);
    for (const t of trees) drawTree(t);
    obstacles.sort((a, b) => b.z - a.z);
    for (const o of obstacles) if (o.z >= 0) drawObstacle(o);
    drawPlayer();
    for (const o of obstacles) if (o.z < 0) drawObstacle(o);

    // 2段ジャンプの煙エフェクト
    for (const pf of puffs) {
      ctx.strokeStyle = 'rgba(255,255,255,' + Math.max(pf.a, 0) + ')';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(pf.x, pf.y, pf.r, pf.r * 0.35, 0, 0, 7);
      ctx.stroke();
      pf.r += 2.2;
      pf.a -= 0.06;
    }
    puffs = puffs.filter(pf => pf.a > 0);

    // HUD
    if (state !== 'title') {
      ctx.fillStyle = '#234';
      ctx.font = 'bold 26px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('SCORE ' + score, 16, 38);
      ctx.textAlign = 'right';
      ctx.fillText('BEST ' + Math.max(best, score), W - 16, 38);
    }
  }

  // ---- 結果画像（シェアカード） ----
  function makeCard() {
    const c = document.createElement('canvas');
    c.width = 800; c.height = 420;
    const x = c.getContext('2d');
    const grad = x.createLinearGradient(0, 0, 800, 420);
    grad.addColorStop(0, '#ff9a56');
    grad.addColorStop(1, '#ff5e62');
    x.fillStyle = grad;
    x.fillRect(0, 0, 800, 420);
    x.fillStyle = 'rgba(255,255,255,.14)';
    x.beginPath(); x.arc(90, 350, 130, 0, 7); x.fill();
    x.beginPath(); x.arc(720, 60, 100, 0, 7); x.fill();
    x.fillStyle = '#fff';
    x.textAlign = 'center';
    x.font = 'bold 40px sans-serif';
    x.fillText('🏃 ワンタップ・ジャンプ', 400, 84);
    x.font = 'bold 130px sans-serif';
    x.fillText(String(score), 400, 240);
    x.font = 'bold 24px sans-serif';
    x.fillText('SCORE', 400, 282);
    x.font = '20px sans-serif';
    x.fillText('BEST ' + best + '　' + new Date().toLocaleDateString('ja-JP'), 400, 340);
    x.fillText('#100日アプリチャレンジ Day 1/100', 400, 378);
    return new Promise(r => c.toBlob(r, 'image/png'));
  }

  async function saveImage() {
    const b = await makeCard();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'tapjump_score_' + score + '.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }

  async function shareImage() {
    const b = await makeCard();
    const f = new File([b], 'tapjump_score.png', { type: 'image/png' });
    const data = { files: [f], title: 'ワンタップ・ジャンプ', text: 'スコア ' + score + '！ #100日アプリチャレンジ Day1' };
    if (navigator.canShare && navigator.canShare(data)) {
      try { await navigator.share(data); } catch (e) { /* キャンセル時は何もしない */ }
    } else {
      await saveImage();
    }
  }

  // ---- 入力（スワイプ=レーン移動 / タップ=ジャンプ） ----
  let gesture = null;
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (state === 'title') { start(); return; }
    gesture = { x: e.clientX, y: e.clientY, t: performance.now(), used: false };
  });
  canvas.addEventListener('pointermove', e => {
    if (!gesture || gesture.used) return;
    const dx = e.clientX - gesture.x, dy = e.clientY - gesture.y;
    if (Math.abs(dx) > 36 && Math.abs(dx) > Math.abs(dy) * 1.2) {
      gesture.used = true;
      changeLane(dx > 0 ? 1 : -1);
    }
  });
  window.addEventListener('pointerup', e => {
    if (!gesture) return;
    const dx = e.clientX - gesture.x, dy = e.clientY - gesture.y;
    const dur = performance.now() - gesture.t;
    if (!gesture.used && dur < 350 && Math.hypot(dx, dy) < 24) jump();
    gesture = null;
  });
  window.addEventListener('keydown', e => {
    const c = e.code;
    if (c === 'Space' || c === 'ArrowUp' || c === 'KeyW') {
      e.preventDefault();
      if (e.repeat) return;
      jumpHeld = true;
      if (state === 'title') start();
      else if (state === 'play') jump();
      else if (state === 'over' && performance.now() - overAt > 500) start();
    } else if (c === 'ArrowLeft' || c === 'KeyA') {
      e.preventDefault();
      changeLane(-1);
    } else if (c === 'ArrowRight' || c === 'KeyD') {
      e.preventDefault();
      changeLane(1);
    }
  });
  window.addEventListener('keyup', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') jumpHeld = false;
  });

  $('btnStart').onclick = start;
  $('btnRetry').onclick = start;
  $('btnRevive').onclick = revive;
  $('btnGiveup').onclick = finish;
  $('btnSave').onclick = saveImage;
  $('btnShare').onclick = shareImage;

  // ---- 起動 ----
  let lastT = performance.now();
  function loop() {
    const now = performance.now();
    const dt = Math.min((now - lastT) / 16.667, 2.5);
    lastT = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  reset();
  $('bestTitle').textContent = best;
  showPanel('title');
  loop();
})();
</script>
</body>
</html>
